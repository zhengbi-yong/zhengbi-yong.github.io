name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 代码格式检查
  formatting:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # 代码检查 (Clippy)
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Run clippy
        run: cargo clippy -- -D warnings

  # 单元测试
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: blog_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run migrations
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blog_test
        run: |
          cargo install sqlx-cli --no-default-features --features native-tls,postgres
          sqlx migrate run --database-url $TEST_DATABASE_URL

      - name: Run unit tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blog_test
          REDIS_URL: redis://localhost:6379
        run: cargo test --lib

  # 集成测试
  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: blog_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run migrations
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blog_test
        run: |
          cargo install sqlx-cli --no-default-features --features native-tls,postgres
          sqlx migrate run --database-url $TEST_DATABASE_URL

      - name: Start API server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blog_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_key_32_characters_long
          RUST_ENV: test
        run: |
          cargo run --bin api &
          sleep 5  # Wait for server to start

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blog_test
          REDIS_URL: redis://localhost:6379
        run: cargo test --test integration_tests

      - name: Stop API server
        if: always()
        run: pkill -f "cargo run --bin api" || true

  # 安全漏洞扫描
  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  # Docker 构建
  docker_build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit_tests, integration_tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: blog-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 性能测试
  performance_tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [integration_tests]
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: blog_perf
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install Apache Bench
        run: sudo apt-get update && sudo apt-get install -y apache2-utils

      - name: Start API server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blog_perf
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_key_32_characters_long
          RUST_ENV: production
        run: |
          cargo run --release --bin api &
          sleep 10  # Wait for server to start

      - name: Run performance tests
        run: |
          # Health check
          curl -f http://localhost:3000/healthz || exit 1

          # Load test health endpoint
          ab -n 1000 -c 10 http://localhost:3000/healthz

          # Load test API endpoints (with proper authentication)
          # This would require proper test data setup in a real scenario

      - name: Stop API server
        if: always()
        run: pkill -f "cargo run --bin api" || true

  # 部署到开发环境
  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker_build, performance_tests]
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: blog-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to staging
        run: |
          # 这里会使用 kubectl 或其他部署工具
          # echo "Deploying to staging environment"
          # kubectl set image deployment/blog-api blog-api=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -n staging

  # 部署到生产环境
  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker_build, performance_tests]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: blog-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to production
        run: |
          # 这里会使用 kubectl 或其他部署工具进行蓝绿部署
          # echo "Deploying to production environment"
          # kubectl set image deployment/blog-api blog-api=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -n production

      - name: Health check after deployment
        run: |
          # 等待部署完成并进行健康检查
          # sleep 60
          # curl -f https://api.yourdomain.com/healthz || exit 1