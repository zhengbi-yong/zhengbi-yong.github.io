[package]
name = "health-check"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "health_check"
path = "src/bin/health_check.rs"

[dependencies]
axum = "0.7"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = "0.3"