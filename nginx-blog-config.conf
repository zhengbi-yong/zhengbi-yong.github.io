server {
    listen 80;
    server_name zhengbi-yong.top 152.136.43.194;

    # 静态资源根目录
    root /home/ubuntu/PersonalBlog/out;
    
    # 默认首页配置
    index index.html;

    # 启用 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # 处理博客文章路由（必须在通用 location 之前）
    # Next.js 静态导出会生成 /blog/robotics/dexmani.html
    # 但链接是 /blog/robotics/dexmani（没有 .html）
    location ~ ^/blog/ {
        # 关键：必须包含 $uri.html 来处理 Next.js 静态导出
        try_files $uri $uri.html $uri/ /index.html;
    }

    # 处理所有其他请求
    location / {
        # 关键修复：添加 $uri.html 来处理 Next.js 静态导出
        # 顺序：先尝试文件 -> 再尝试 .html 文件 -> 再尝试目录 -> 最后回退到 index.html
        try_files $uri $uri.html $uri/ /index.html;
    }

    # 处理 _next 静态资源（长期缓存）
    location /_next/static {
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # 静态资源缓存配置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # 错误页面配置
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

