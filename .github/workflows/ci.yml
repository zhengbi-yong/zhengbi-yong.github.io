name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm' # only enables caching, does not install pnpm

    - name: Setup pnpm (official action)
      uses: pnpm/action-setup@v3
      with:
        version: '10'        # use major version for robustness
        run_install: false   # we'll run install explicitly below

    - name: Verify pnpm is available (and fallback to npm global install)
      run: |
        node -v
        npm -v
        echo "PATH=$PATH"
        if command -v pnpm >/dev/null 2>&1; then
          echo "pnpm found: $(pnpm --version)"
        else
          echo "pnpm not found. Installing pnpm globally via npm as fallback..."
          npm install -g pnpm@10 || npm install -g pnpm
          pnpm --version
        fi

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build project
      run: pnpm build
      env:
        NODE_ENV: production
