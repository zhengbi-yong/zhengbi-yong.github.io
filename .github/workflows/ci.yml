name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 替换现有 Setup Node + Setup pnpm + Install dependencies 段
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm' # 仅做 cache，不会安装 pnpm

    - name: Setup pnpm (official action)
      uses: pnpm/action-setup@v3
      with:
        version: '10'        # 使用主版本号或 'latest'，避免精确小版本导致找不到
        run_install: false   # 我们在后面单独运行 install

    - name: Verify pnpm is available (and fallback to npm global install)
      run: |
        echo "PATH=$PATH"
        if command -v pnpm >/dev/null 2>&1; then
          pnpm --version
        else
          echo "pnpm not found. Installing pnpm globally via npm as fallback..."
          npm install -g pnpm@10 || npm install -g pnpm
          pnpm --version
        fi

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Build project
      run: pnpm build
      env:
        NODE_ENV: production
