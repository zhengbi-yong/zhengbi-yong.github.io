name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 1. 先安装 pnpm（必须在 setup-node 之前）
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.24.0     # 使用精确版本匹配 package.json 中的 packageManager 字段
    
    # 2. 然后设置 Node.js（此时可以使用 cache: pnpm，因为 pnpm 已经安装）
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'        # 现在可以使用 pnpm 缓存了

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Build project
      run: pnpm build
      env:
        NODE_ENV: production
