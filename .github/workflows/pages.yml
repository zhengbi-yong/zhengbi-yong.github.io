# Inspired from https://github.com/actions/starter-workflows/blob/main/pages/nextjs.yml
name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 设置 Node.js（不启用缓存，避免自动检测 pnpm）
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # 2. 安装 pnpm（使用 npm 全局安装，更稳定）
      - name: Install pnpm
        run: npm install -g pnpm@10.24.0

      # 3. 验证 pnpm 安装
      - name: Verify pnpm
        run: pnpm --version

      # 4. 设置 pnpm store 缓存（更新路径到frontend目录）
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - id: configurepages
        uses: actions/configure-pages@v5
        
      # 5. 恢复 Next.js 缓存（更新路径到frontend目录）
      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/pnpm-lock.yaml') }}-${{ hashFiles('frontend/**/*.[jt]s', 'frontend/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/pnpm-lock.yaml') }}-

      # 6. 安装依赖 (切换到frontend目录)
      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      # 7. 运行Linting检查
      - name: Run ESLint
        working-directory: ./frontend
        run: pnpm lint --max-warnings=0

      # 8. 运行TypeScript类型检查
      - name: TypeScript type check
        working-directory: ./frontend
        run: pnpm tsc --noEmit

      # 9. 运行单元测试
      - name: Run unit tests
        working-directory: ./frontend
        run: pnpm test --run --coverage --reporter=verbose

      # 10. 上传覆盖率报告
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      # 11. 生成contentlayer文件
      - name: Generate contentlayer files
        working-directory: ./frontend
        run: pnpm contentlayer

      - name: Determine base path
        id: basepath
        run: |
          # 检测是否是子路径部署（仓库名不是 username.github.io）
          REPO_NAME="${{ github.repository }}"
          OWNER="${REPO_NAME%%/*}"
          REPO="${REPO_NAME##*/}"
          
          # 如果仓库名不是 {username}.github.io，则需要 basePath
          if [[ "$REPO" != "${OWNER}.github.io" ]]; then
            echo "base_path=/$REPO" >> $GITHUB_OUTPUT
            echo "NEXT_PUBLIC_BASE_PATH=/$REPO" >> $GITHUB_ENV
            echo "BASE_PATH=/$REPO" >> $GITHUB_ENV
            echo "检测到子路径部署，设置 basePath: /$REPO"
          else
            echo "base_path=" >> $GITHUB_OUTPUT
            echo "NEXT_PUBLIC_BASE_PATH=" >> $GITHUB_ENV
            echo "BASE_PATH=" >> $GITHUB_ENV
            echo "根路径部署，basePath 为空"
          fi
          
       # 7. 构建 (在frontend目录中执行)
      - run: pnpm build
        working-directory: ./frontend
        env:
          EXPORT: 1
          UNOPTIMIZED: 1
          BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.base_path }}

      - name: Ensure musicxml files are copied
        run: |
          echo "检查 frontend/public/musicxml 目录..."
          if [ -d "frontend/public/musicxml" ]; then
            echo "✓ frontend/public/musicxml 目录存在"
            ls -la frontend/public/musicxml/
            echo ""
            echo "确保 frontend/out/musicxml 目录存在..."
            mkdir -p frontend/out/musicxml
            echo "复制 musicxml 文件到 out 目录..."
            cp -r frontend/public/musicxml/* frontend/out/musicxml/ 2>&1
            if [ $? -eq 0 ]; then
              echo "✓ 复制成功"
            else
              echo "✗ 复制失败"
            fi
            echo ""
            echo "验证 frontend/out/musicxml 目录..."
            if [ -d "frontend/out/musicxml" ]; then
              echo "✓ frontend/out/musicxml 目录存在"
              ls -la frontend/out/musicxml/
              echo ""
              echo "检查文件数量..."
              FILE_COUNT=$(find frontend/out/musicxml -type f | wc -l)
              echo "找到 $FILE_COUNT 个文件"
            else
              echo "✗ frontend/out/musicxml 目录不存在"
            fi
          else
            echo "✗ frontend/public/musicxml 目录不存在"
          fi

      - name: Build Slidev presentations
        run: |
          cd frontend && node scripts/build-slidev.mjs
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4