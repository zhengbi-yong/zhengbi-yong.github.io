# Inspired from https://github.com/actions/starter-workflows/blob/main/pages/nextjs.yml
name: GitHub Pages

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. (可选) 移除 packageManager 字段
      # 仅在 actions/setup-node 报告与 packageManager 相关的错误时才保留
      - name: Remove packageManager field before setup-node
        run: |
          echo "=== Removing packageManager field ==="
          # 使用 sed 直接修改文件（不依赖 Node.js）
          sed -i '/"packageManager"/d' package.json
          echo ""
          echo "=== Verifying removal ==="
          grep packageManager package.json && echo "ERROR: packageManager still exists!" || echo "SUCCESS: packageManager removed"
          echo ""
          echo "=== Showing modified package.json (last 5 lines) ==="
          tail -5 package.json

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 注意：这里不使用 cache: 'pnpm' 来避免提前调用 pnpm

      # 3. 🌟 使用官方 Action 安装 pnpm 并设置缓存（解决找不到 pnpm 的问题）
      - name: Setup pnpm and Cache
        uses: pnpm/action-setup@v3 
        with:
          version: 10.24.0 # 确保使用你需要的 pnpm 版本
          run_install: false # 不在这里运行 install
          cache: true # 自动设置和恢复 pnpm store 的缓存 (最推荐的方式)

      # ❌ 移除 'Debug - After setup-node' 步骤 (不再需要)
      # ❌ 移除 'Install pnpm globally via npm' 步骤 (已替换)
      # ❌ 移除 'Get pnpm store directory' 步骤 (已替换)
      # ❌ 移除 'Setup pnpm cache' 步骤 (已替换)

      - id: configurepages
        uses: actions/configure-pages@v5
        
      # 4. 恢复 Next.js 缓存（保留 Next.js 特定的缓存）
      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      # 5. 安装依赖 (现在 pnpm 肯定在 PATH 中)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate contentlayer files
        run: pnpm contentlayer

      - name: Determine base path
        id: basepath
        run: |
          # 检测是否是子路径部署（仓库名不是 username.github.io）
          REPO_NAME="${{ github.repository }}"
          OWNER="${REPO_NAME%%/*}"
          REPO="${REPO_NAME##*/}"
          
          # 如果仓库名不是 {username}.github.io，则需要 basePath
          if [[ "$REPO" != "${OWNER}.github.io" ]]; then
            echo "base_path=/$REPO" >> $GITHUB_OUTPUT
            echo "NEXT_PUBLIC_BASE_PATH=/$REPO" >> $GITHUB_ENV
            echo "BASE_PATH=/$REPO" >> $GITHUB_ENV
            echo "检测到子路径部署，设置 basePath: /$REPO"
          else
            echo "base_path=" >> $GITHUB_OUTPUT
            echo "NEXT_PUBLIC_BASE_PATH=" >> $GITHUB_ENV
            echo "BASE_PATH=" >> $GITHUB_ENV
            echo "根路径部署，basePath 为空"
          fi
          
      # 6. 构建
      - run: pnpm build
        env:
          EXPORT: 1
          UNOPTIMIZED: 1
          BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.base_path }}

      - name: Ensure musicxml files are copied
        run: |
          echo "检查 public/musicxml 目录..."
          if [ -d "public/musicxml" ]; then
            echo "✓ public/musicxml 目录存在"
            ls -la public/musicxml/
            echo ""
            echo "确保 out/musicxml 目录存在..."
            mkdir -p out/musicxml
            echo "复制 musicxml 文件到 out 目录..."
            cp -r public/musicxml/* out/musicxml/ 2>&1
            if [ $? -eq 0 ]; then
              echo "✓ 复制成功"
            else
              echo "✗ 复制失败"
            fi
            echo ""
            echo "验证 out/musicxml 目录..."
            if [ -d "out/musicxml" ]; then
              echo "✓ out/musicxml 目录存在"
              ls -la out/musicxml/
              echo ""
              echo "检查文件数量..."
              FILE_COUNT=$(find out/musicxml -type f | wc -l)
              echo "找到 $FILE_COUNT 个文件"
            else
              echo "✗ out/musicxml 目录不存在"
            fi
          else
            echo "✗ public/musicxml 目录不存在"
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4