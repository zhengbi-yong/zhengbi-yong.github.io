# Inspired from https://github.com/actions/starter-workflows/blob/main/pages/nextjs.yml
name: GitHub Pages

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable Corepack
        run: corepack enable
      - name: Install pnpm
        run: corepack prepare pnpm@10.24.0 --activate
      - name: Verify pnpm
        run: pnpm --version
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - id: configurepages
        uses: actions/configure-pages@v5
      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate contentlayer files
        run: pnpm contentlayer
      - name: Determine base path
        id: basepath
        run: |
          # 检测是否是子路径部署（仓库名不是 username.github.io）
          REPO_NAME="${{ github.repository }}"
          OWNER="${REPO_NAME%%/*}"
          REPO="${REPO_NAME##*/}"
          
          # 如果仓库名不是 {username}.github.io，则需要 basePath
          if [[ "$REPO" != "${OWNER}.github.io" ]]; then
            echo "base_path=/$REPO" >> $GITHUB_OUTPUT
            echo "NEXT_PUBLIC_BASE_PATH=/$REPO" >> $GITHUB_ENV
            echo "BASE_PATH=/$REPO" >> $GITHUB_ENV
            echo "检测到子路径部署，设置 basePath: /$REPO"
          else
            echo "base_path=" >> $GITHUB_OUTPUT
            echo "NEXT_PUBLIC_BASE_PATH=" >> $GITHUB_ENV
            echo "BASE_PATH=" >> $GITHUB_ENV
            echo "根路径部署，basePath 为空"
          fi
      - run: pnpm build
        env:
          EXPORT: 1
          UNOPTIMIZED: 1
          BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.base_path }}
      - name: Ensure musicxml files are copied
        run: |
          echo "检查 public/musicxml 目录..."
          if [ -d "public/musicxml" ]; then
            echo "✓ public/musicxml 目录存在"
            ls -la public/musicxml/
            echo ""
            echo "确保 out/musicxml 目录存在..."
            mkdir -p out/musicxml
            echo "复制 musicxml 文件到 out 目录..."
            cp -r public/musicxml/* out/musicxml/ 2>&1
            if [ $? -eq 0 ]; then
              echo "✓ 复制成功"
            else
              echo "✗ 复制失败"
            fi
            echo ""
            echo "验证 out/musicxml 目录..."
            if [ -d "out/musicxml" ]; then
              echo "✓ out/musicxml 目录存在"
              ls -la out/musicxml/
              echo ""
              echo "检查文件数量..."
              FILE_COUNT=$(find out/musicxml -type f | wc -l)
              echo "找到 $FILE_COUNT 个文件"
            else
              echo "✗ out/musicxml 目录不存在"
            fi
          else
            echo "✗ public/musicxml 目录不存在"
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
