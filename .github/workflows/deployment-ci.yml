name: Deployment Assets CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'docker-compose.production.yml'
      - '.env.production.example'
      - 'deployments/**'
      - 'deployments/environments/**'
      - 'scripts/deployment/deploy-compose-stack.sh'
      - 'scripts/deployment/validate-production-env.sh'
      - 'scripts/release/**'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
      - '.github/workflows/release-images.yml'
      - 'frontend/src/lib/api/resolveBackendApiBaseUrl.ts'
      - 'frontend/tests/lib/api/resolveBackendApiBaseUrl.test.ts'
      - 'README.md'
      - 'docs/deployment/**'
      - 'Makefile'
  pull_request:
    branches: [main, develop]
    paths:
      - 'docker-compose.production.yml'
      - '.env.production.example'
      - 'deployments/**'
      - 'deployments/environments/**'
      - 'scripts/deployment/deploy-compose-stack.sh'
      - 'scripts/deployment/validate-production-env.sh'
      - 'scripts/release/**'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
      - '.github/workflows/release-images.yml'
      - 'frontend/src/lib/api/resolveBackendApiBaseUrl.ts'
      - 'frontend/tests/lib/api/resolveBackendApiBaseUrl.test.ts'
      - 'README.md'
      - 'docs/deployment/**'
      - 'Makefile'

jobs:
  validate-assets:
    name: Validate Deployment Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment shell scripts
        run: bash -n scripts/deployment/validate-production-env.sh scripts/deployment/deploy-compose-stack.sh scripts/release/oci-metadata.sh scripts/release/render-release-assets.sh

      - name: Create non-placeholder production env
        run: |
          python3 - <<'PY'
          from pathlib import Path
          src = Path('.env.production.example').read_text()
          replacements = {
              'ghcr.io/your-org/your-repo/blog-backend:1.8.2': 'ghcr.io/acme/blog/blog-backend:1.8.2',
              'ghcr.io/your-org/your-repo/blog-frontend:1.8.2': 'ghcr.io/acme/blog/blog-frontend:1.8.2',
              'https://blog.example.com': 'https://blog.ci.example',
              'replace-with-a-strong-database-password': 'postgres-password-1234567890',
              'replace-with-a-strong-redis-password': 'redis-password-1234567890',
              'replace-with-a-32-byte-jwt-secret': 'jwt-secret-abcdefghijklmnopqrstuvwxyz123456',
              'replace-with-a-separate-32-byte-password-pepper': 'pepper-secret-abcdefghijklmnopqrstuvwxyz123',
              'smtp.example.com': 'smtp.ci.example',
              'noreply@example.com': 'ops@ci.example',
              'replace-with-smtp-password': 'smtp-password-1234567890',
          }
          for old, new in replacements.items():
              src = src.replace(old, new)
          Path('.env.production.ci').write_text(src)
          PY

      - name: Validate production env policy
        run: bash scripts/deployment/validate-production-env.sh .env.production.ci

      - name: Render production compose stack
        run: docker compose --env-file .env.production.ci -f docker-compose.production.yml config > /tmp/blog-compose-production.rendered.yml

      - name: Validate Kubernetes manifests
        run: |
          python3 -m pip install --quiet pyyaml
          python3 - <<'PY'
          import yaml
          from pathlib import Path
          roots = [
              Path('deployments/kubernetes/base'),
              Path('deployments/kubernetes/overlays/production'),
              Path('deployments/kubernetes/overlays/staging'),
          ]
          for root in roots:
              for path in sorted(root.glob('*.yaml')):
                  with path.open('r', encoding='utf-8') as fh:
                      list(yaml.safe_load_all(fh))
                  print(f"validated {path}")
          PY

      - name: Validate release metadata resolver
        run: |
          bash scripts/release/oci-metadata.sh --version 9.9.9 --ref-name v9.9.9 --ref-type tag > /tmp/oci-metadata.env
          grep '^app_version=9.9.9$' /tmp/oci-metadata.env
          grep '^publish_release=true$' /tmp/oci-metadata.env
          grep '^publish_major_minor=true$' /tmp/oci-metadata.env

      - name: Render versioned release assets
        env:
          GITOPS_REPO_URL: https://github.com/acme/platform-gitops.git
          GITOPS_TARGET_REVISION: main
          GITOPS_BASE_PATH: releases
          ARGOCD_NAMESPACE: argocd
          ARGOCD_PROJECT: blog-platform
        run: |
          bash scripts/release/render-release-assets.sh \
            --version 9.9.9 \
            --repository acme/blog \
            --backend-digest 1111111111111111111111111111111111111111111111111111111111111111 \
            --frontend-digest 2222222222222222222222222222222222222222222222222222222222222222
          test -f dist/release-assets/9.9.9/compose/production.env
          test -f dist/release-assets/9.9.9/kubernetes/production/kustomization.yaml
          test -f dist/release-assets/blog-platform-release-9.9.9.tar.gz
          test -f dist/release-assets/blog-platform-release-9.9.9.sha256

      - name: Validate rendered release assets
        run: |
          python3 - <<'PY'
          import json
          import yaml
          from pathlib import Path
          manifest = Path('dist/release-assets/9.9.9/manifest.json')
          data = json.loads(manifest.read_text())
          assert data['appVersion'] == '9.9.9'
          assert data['images']['backend']['digest'] == 'sha256:' + '1' * 64
          assert data['images']['frontend']['digest'] == 'sha256:' + '2' * 64
          for path in [
              Path('dist/release-assets/9.9.9/kubernetes/production/kustomization.yaml'),
              Path('dist/release-assets/9.9.9/kubernetes/production/release-config-patch.yaml'),
              Path('dist/release-assets/9.9.9/kubernetes/production/image-lock-patch.yaml'),
              Path('dist/release-assets/9.9.9/kubernetes/staging/kustomization.yaml'),
              Path('dist/release-assets/9.9.9/kubernetes/staging/release-config-patch.yaml'),
              Path('dist/release-assets/9.9.9/kubernetes/staging/image-lock-patch.yaml'),
              Path('dist/release-assets/9.9.9/gitops/argocd/applications/kustomization.yaml'),
              Path('dist/release-assets/9.9.9/gitops/argocd/applications/project.yaml'),
              Path('dist/release-assets/9.9.9/gitops/argocd/applications/production-application.yaml'),
              Path('dist/release-assets/9.9.9/gitops/argocd/applications/staging-application.yaml'),
              Path('dist/release-assets/9.9.9/gitops/argocd/production/kustomization.yaml'),
              Path('dist/release-assets/9.9.9/gitops/argocd/production/migrate-hook-patch.yaml'),
              Path('dist/release-assets/9.9.9/gitops/argocd/staging/kustomization.yaml'),
              Path('dist/release-assets/9.9.9/gitops/argocd/staging/migrate-hook-patch.yaml'),
          ]:
              list(yaml.safe_load_all(path.read_text()))
              print(f'validated {path}')
          PY

      - uses: pnpm/action-setup@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Verify backend URL resolver behavior
        working-directory: ./frontend
        run: pnpm exec vitest run tests/lib/api/resolveBackendApiBaseUrl.test.ts
