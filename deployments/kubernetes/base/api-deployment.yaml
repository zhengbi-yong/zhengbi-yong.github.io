apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-api
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blog-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog-api
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: api
          image: blog-backend
          command: ["api"]
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: blog-runtime-config
            - secretRef:
                name: blog-runtime-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: blog-api
