apiVersion: v1
kind: Secret
metadata:
  name: blog-runtime-secrets
  namespace: blog-platform
type: Opaque
stringData:
  DATABASE_URL: postgresql://blog_user:replace-with-strong-password@postgresql.database.svc.cluster.local:5432/blog_db
  REDIS_URL: redis://:replace-with-strong-redis-password@redis.cache.svc.cluster.local:6379
  JWT_SECRET: replace-with-a-32-byte-jwt-secret
  PASSWORD_PEPPER: replace-with-a-different-32-byte-password-pepper
  SMTP_HOST: smtp.example.com
  SMTP_USERNAME: noreply@example.com
  SMTP_PASSWORD: replace-with-smtp-password
  SMTP_FROM: noreply@example.com
  MEILISEARCH_MASTER_KEY: replace-with-meilisearch-master-key
  MINIO_ACCESS_KEY: replace-with-minio-access-key
  MINIO_SECRET_KEY: replace-with-minio-secret-key
  NEXT_PUBLIC_SENTRY_DSN: ""
