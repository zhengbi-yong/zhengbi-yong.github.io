apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-frontend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blog-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog-frontend
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: frontend
          image: blog-frontend
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: blog-runtime-config
            - secretRef:
                name: blog-runtime-secrets
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 768Mi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: blog-frontend
