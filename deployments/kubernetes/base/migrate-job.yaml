apiVersion: batch/v1
kind: Job
metadata:
  name: blog-migrate
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog-migrate
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: blog-backend
          command: ["migrate"]
          envFrom:
            - configMapRef:
                name: blog-runtime-config
            - secretRef:
                name: blog-runtime-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
