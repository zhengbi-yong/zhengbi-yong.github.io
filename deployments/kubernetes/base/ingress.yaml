apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blog-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 20m
spec:
  ingressClassName: nginx
  rules:
    - host: blog.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: blog-api
                port:
                  number: 3000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: blog-api
                port:
                  number: 3000
          - path: /.well-known/live
            pathType: Exact
            backend:
              service:
                name: blog-api
                port:
                  number: 3000
          - path: /.well-known/ready
            pathType: Exact
            backend:
              service:
                name: blog-api
                port:
                  number: 3000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: blog-api
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: blog-frontend
                port:
                  number: 3001
