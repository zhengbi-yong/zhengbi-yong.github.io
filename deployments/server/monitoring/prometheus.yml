global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'blog-system'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']  # 启用 Alertmanager
      timeout: 5s

# 告警规则文件
rule_files:
  - 'alerts/*.yml'

scrape_configs:
  # Backend API监控
  - job_name: 'blog-api'
    static_configs:
      - targets: ['backend:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # PostgreSQL监控（需要postgres_exporter）
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']

  # Redis监控（需要redis_exporter）
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']

  # Frontend监控（Next.js自带的指标）
  - job_name: 'blog-frontend'
    static_configs:
      - targets: ['frontend:3000']
