name: ${COMPOSE_PROJECT_NAME:-blog-platform}

x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile
  target: production
  args:
    APP_VERSION: ${APP_VERSION:-dev}
    VCS_REF: ${VCS_REF:-local}
    BUILD_DATE: ${BUILD_DATE:-unknown}

x-backend-environment: &backend-environment
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  DATABASE_REPLICA_URL: ${DATABASE_REPLICA_URL}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
  JWT_SECRET: ${JWT_SECRET}
  PASSWORD_PEPPER: ${PASSWORD_PEPPER}
  SERVER_HOST: 0.0.0.0
  SERVER_PORT: 3000
  ENVIRONMENT: ${APP_RUNTIME_ENVIRONMENT:-production}
  RUST_LOG: ${RUST_LOG:-info}
  DATABASE_POOL_MAX_CONNECTIONS: ${DATABASE_POOL_MAX_CONNECTIONS:-20}
  DATABASE_POOL_MIN_CONNECTIONS: ${DATABASE_POOL_MIN_CONNECTIONS:-5}
  DATABASE_POOL_ACQUIRE_TIMEOUT_SECS: ${DATABASE_POOL_ACQUIRE_TIMEOUT_SECS:-10}
  DATABASE_POOL_MAX_LIFETIME_SECS: ${DATABASE_POOL_MAX_LIFETIME_SECS:-1800}
  DATABASE_POOL_IDLE_TIMEOUT_SECS: ${DATABASE_POOL_IDLE_TIMEOUT_SECS:-600}
  REDIS_POOL_MAX_SIZE: ${REDIS_POOL_MAX_SIZE:-10}
  REDIS_POOL_WAIT_TIMEOUT_SECS: ${REDIS_POOL_WAIT_TIMEOUT_SECS:-5}
  REDIS_POOL_CREATE_TIMEOUT_SECS: ${REDIS_POOL_CREATE_TIMEOUT_SECS:-5}
  REDIS_POOL_RECYCLE_TIMEOUT_SECS: ${REDIS_POOL_RECYCLE_TIMEOUT_SECS:-5}
  WORKER_POLL_INTERVAL_SECS: ${WORKER_POLL_INTERVAL_SECS:-5}
  WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-100}
  WORKER_LOCK_TIMEOUT_SECS: ${WORKER_LOCK_TIMEOUT_SECS:-300}
  HEALTH_OUTBOX_PENDING_WARN_THRESHOLD: ${HEALTH_OUTBOX_PENDING_WARN_THRESHOLD:-1000}
  HEALTH_OUTBOX_PENDING_FAIL_THRESHOLD: ${HEALTH_OUTBOX_PENDING_FAIL_THRESHOLD:-5000}
  HEALTH_OUTBOX_OLDEST_WARN_SECS: ${HEALTH_OUTBOX_OLDEST_WARN_SECS:-60}
  HEALTH_OUTBOX_OLDEST_FAIL_SECS: ${HEALTH_OUTBOX_OLDEST_FAIL_SECS:-300}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USERNAME: ${SMTP_USERNAME}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_FROM: ${SMTP_FROM}
  SMTP_TLS: ${SMTP_TLS:-true}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
  CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
  CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Authorization,Content-Type,Accept}
  RATE_LIMIT_AUTH_RPS: ${RATE_LIMIT_AUTH_RPS:-5}
  RATE_LIMIT_AUTH_RPM: ${RATE_LIMIT_AUTH_RPM:-100}
  RATE_LIMIT_VIEW_RPS: ${RATE_LIMIT_VIEW_RPS:-10}
  RATE_LIMIT_VIEW_RPM: ${RATE_LIMIT_VIEW_RPM:-1000}
  RATE_LIMIT_COMMENT_RPS: ${RATE_LIMIT_COMMENT_RPS:-2}
  RATE_LIMIT_COMMENT_RPM: ${RATE_LIMIT_COMMENT_RPM:-20}
  RATE_LIMIT_DEFAULT_RPS: ${RATE_LIMIT_DEFAULT_RPS:-100}
  RATE_LIMIT_DEFAULT_RPM: ${RATE_LIMIT_DEFAULT_RPM:-6000}
  RATE_LIMIT_FAILURE_MODE: ${RATE_LIMIT_FAILURE_MODE:-fail_open}
  STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
  STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-/app/uploads}
  STORAGE_LOCAL_URL: ${STORAGE_LOCAL_URL:-/uploads}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-}
  MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
  MINIO_BUCKET: ${MINIO_BUCKET:-}
  MINIO_REGION: ${MINIO_REGION:-us-east-1}
  MEILISEARCH_URL: ${MEILISEARCH_URL:-}
  MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-}
  MEILISEARCH_INDEX: ${MEILISEARCH_INDEX:-posts}
  MEILISEARCH_AUTO_SYNC: ${MEILISEARCH_AUTO_SYNC:-false}
  FRONTEND_BLOG_DIR: ${FRONTEND_BLOG_DIR:-/app/data/blog}
  OTEL_ENABLED: ${OTEL_ENABLED:-false}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-blog-api}
  OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-${APP_VERSION:-dev}}

x-backend-service: &backend-service
  image: ${BACKEND_IMAGE:-blog-backend:local}
  build: *backend-build
  restart: unless-stopped
  environment: *backend-environment
  networks:
    - blog-network

x-frontend-build: &frontend-build
  context: ./frontend
  dockerfile: Dockerfile
  args:
    APP_VERSION: ${APP_VERSION:-dev}
    VCS_REF: ${VCS_REF:-local}
    BUILD_DATE: ${BUILD_DATE:-unknown}
    NEXT_IGNORE_BUILD_ERRORS: ${NEXT_IGNORE_BUILD_ERRORS:-0}
    NEXT_IGNORE_ESLINT: ${NEXT_IGNORE_ESLINT:-0}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  meilisearch:
    image: ${MEILISEARCH_IMAGE:-getmeili/meilisearch:v1.12}
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_ENV: ${APP_RUNTIME_ENVIRONMENT:-production}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "${MEILISEARCH_BIND_HOST:-127.0.0.1}:${MEILISEARCH_PORT:-7700}:7700"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network
    profiles:
      - search

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-02-28T09-55-16Z}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_BIND_HOST:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_BIND_HOST:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network
    profiles:
      - object-storage

  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:v1.27}
    restart: unless-stopped
    ports:
      - "${MAILPIT_BIND_HOST:-127.0.0.1}:${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_BIND_HOST:-127.0.0.1}:${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - blog-network
    profiles:
      - mail

  migrate:
    <<: *backend-service
    command: ["migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - ops

  api:
    <<: *backend-service
    command: ["api"]
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-3000}:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/livez"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    <<: *backend-service
    command: ["worker"]
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -aq worker /proc/1/cmdline || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    image: ${FRONTEND_IMAGE:-blog-frontend:local}
    build: *frontend-build
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://api:3000}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_ENABLED: ${NEXT_PUBLIC_SENTRY_ENABLED:-false}
      NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE:-0.1}
      NEXT_PUBLIC_SENTRY_RELEASE: ${NEXT_PUBLIC_SENTRY_RELEASE:-${APP_VERSION:-dev}}
      OTEL_ENABLED: ${FRONTEND_OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${FRONTEND_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${FRONTEND_OTEL_SERVICE_NAME:-blog-frontend}
      OTEL_SERVICE_VERSION: ${FRONTEND_OTEL_SERVICE_VERSION:-${APP_VERSION:-dev}}
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_PORT:-3001}:3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - blog-network
    volumes:
      - frontend_data:/app/.data

  edge:
    image: ${EDGE_IMAGE:-nginx:1.27-alpine}
    restart: unless-stopped
    ports:
      - "${EDGE_BIND_HOST:-0.0.0.0}:${EDGE_HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployments/nginx/compose/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - blog-network
    profiles:
      - edge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
  uploads_data:
  frontend_data:

networks:
  blog-network:
    driver: bridge
