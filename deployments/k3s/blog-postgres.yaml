# K3s Deployment Manifest for PostgreSQL Database
# CIS Kubernetes Benchmark compliant security configuration

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blog-postgres-env
  namespace: blog
data:
  POSTGRES_USER: "blog_user"
  POSTGRES_DB: "blog_db"
  # Disable automatic updates for security
  POSTGRES_VERSION: "17"
---
apiVersion: v1
kind: Secret
metadata:
  name: blog-postgres-secrets
  namespace: blog
type: Opaque
stringData:
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: blog-postgres
  namespace: blog
  labels:
    app.kubernetes.io/name: blog-postgres
    app.kubernetes.io/component: database
spec:
  serviceName: blog-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blog-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog-postgres
        app.kubernetes.io/component: database
    spec:
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: blog-postgres-pvc
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi

      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: Always

          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          envFrom:
            - configMapRef:
                name: blog-postgres-env
            - secretRef:
                name: blog-postgres-secrets

          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF8 --locale=C"

          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                # Required for PostgreSQL
                - CHOWN
                - DAC_OVERRIDE
                - SETGID
                - SETUID

          # Resource limits
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: tmp
              mountPath: /tmp

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - blog_user
                - -d
                - blog_db
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - blog_user
                - -d
                - blog_db
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: blog-postgres
  namespace: blog
  labels:
    app.kubernetes.io/name: blog-postgres
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    app.kubernetes.io/name: blog-postgres

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: blog-postgres-pvc
  namespace: blog
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
