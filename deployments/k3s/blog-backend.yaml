# K3s Deployment Manifest for Blog Backend API
# CIS Kubernetes Benchmark compliant security configuration
#
# CIS Benchmark References:
# - 5.2.2: Ensure that the seccomp profile is set to Runtime/default
# - 5.2.5: Ensure that the readOnlyRootFilesystem is set to true
# - 5.2.6: Ensure that containers do not run with privileged escalation
# - 5.2.7: Ensure containers are restricted to root user

---
apiVersion: v1
kind: Namespace
metadata:
  name: blog
  labels:
    app.kubernetes.io/name: blog
    app.kubernetes.io/managed-by: kubectl
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blog-backend-env
  namespace: blog
data:
  RUST_LOG: "info"
  ENVIRONMENT: "production"
  # OTEL configuration for W3C Trace Context
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: "blog-api"
---
apiVersion: v1
kind: Secret
metadata:
  name: blog-backend-secrets
  namespace: blog
type: Opaque
stringData:
  DATABASE_URL: "postgresql://blog_user:blog_password@blog-postgres:5432/blog_db"
  REDIS_URL: "redis://blog-redis:6379"
  JWT_SECRET: "${JWT_SECRET}"
  PASSWORD_PEPPER: "${PASSWORD_PEPPER}"
  SESSION_SECRET: "${SESSION_SECRET}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-backend
  namespace: blog
  labels:
    app.kubernetes.io/name: blog-backend
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: blog-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog-backend
        app.kubernetes.io/component: api
      annotations:
        # W3C Trace Context: injected by service mesh
        # traceparent: "00-<trace-id>-<span-id>-01"
    spec:
      # CIS 5.2.6: Disable privilege escalation
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        # CIS 5.2.7: Run as non-root user (must be > 10000 for K3s)
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        # CIS 5.2.2: Seccomp profile
        seccompProfile:
          type: RuntimeDefault

      # CIS 5.2.5: Use read-only root filesystem with tmp volume
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi

      containers:
        - name: api
          image: ghcr.io/zhengbi-yong/zhengbi-yong.github.io/blog-backend:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: blog-backend-env
            - secretRef:
                name: blog-backend-secrets

          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"

          # CIS 5.2.1: Ensure containers only use approved capabilities
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                # Required for network operations
                - NET_BIND_SERVICE

          # Resource limits for QoS
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Health check endpoints
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Mount tmp volume for temporary files
          volumeMounts:
            - name: tmp
              mountPath: /tmp

          # Drop all capabilities and use read-only filesystem
          # Note: Some paths may need to be writable for runtime operations
          # This is a balance between security and functionality

---
apiVersion: v1
kind: Service
metadata:
  name: blog-backend
  namespace: blog
  labels:
    app.kubernetes.io/name: blog-backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: blog-backend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: blog-backend-pdb
  namespace: blog
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blog-backend
