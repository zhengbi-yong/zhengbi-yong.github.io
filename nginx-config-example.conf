# Next.js 静态导出 Nginx 配置示例
# 将此配置添加到您的 Nginx 站点配置文件中

server {
    listen 80;
    server_name 152.136.43.194;  # 替换为您的域名或 IP
    root /home/ubuntu/PersonalBlog/out;  # 替换为您的实际路径
    index index.html;

    # 启用 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # 处理 Next.js 静态导出路由
    location / {
        # 首先尝试直接文件，然后尝试 .html 文件，最后尝试目录
        try_files $uri $uri.html $uri/ /index.html;
    }

    # 处理博客文章路由（嵌套路径）
    location ~ ^/blog/ {
        # 尝试文件、.html 文件、目录，最后回退到 index.html
        try_files $uri $uri.html $uri/ /index.html;
    }

    # 处理 _next 静态资源
    location /_next/static {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # 处理其他静态资源
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 安全头（可选，如果 Next.js 配置了这些头，这里可以省略）
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;
}

